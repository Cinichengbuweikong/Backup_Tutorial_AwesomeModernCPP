# Install with: pnpm hooks:install

repos:
  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ['--config', '.markdownlint.json']
        files: '^documents/.*\.md$'
        exclude: '^documents/.*\bindex\.md$'

  # Local hooks
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format C/C++ sources
        entry: clang-format -i
        language: system
        files: '\.(c|cc|cpp|cxx|h|hh|hpp|hxx)$'

      - id: update-translation-coverage
        name: Update translation coverage
        entry: python3 scripts/coverage.py --update
        language: system
        always_run: true
        pass_filenames: false

  # Check for added large files
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=1500']
      - id: end-of-file-fixer
      - id: trailing-whitespace
        files: '^documents/.*\.md$'
      - id: check-yaml
        files: '^\.github/.*\.ya?ml$'
